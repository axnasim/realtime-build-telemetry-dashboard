# Scrapes OTel Collector at :8889 every 15s

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: telemetry-dashboard
    static_configs:
      - targets: ['telemetry-dashboard:8888']
    metrics_path: /metrics
