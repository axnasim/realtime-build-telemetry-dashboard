# Fires alerts for >50% failure rate, flaky tests, and slow builds (P95 > 5min)

groups:
  - name: build_alerts
    rules:
      - alert: HighBuildFailureRate
        expr: |
          (
            sum(rate(build_count_total{status="FAIL"}[10m])) /
            sum(rate(build_count_total[10m]))
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High build failure rate"
          description: "More than 50% of builds are failing over the last 10 minutes."

      - alert: FlakyCIDetected
        expr: increase(build_flaky_tests_total[1h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Flaky tests detected"
          description: "Flaky test behaviour detected in the last hour."

      - alert: SlowBuilds
        expr: |
          histogram_quantile(0.95,
            sum(rate(build_duration_milliseconds_bucket[30m])) by (le)
          ) > 300000
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Builds are slow"
          description: "P95 build duration exceeded 5 minutes."
