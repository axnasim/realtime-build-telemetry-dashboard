name: CI with Build Telemetry

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main ]

env:
  TELEMETRY_ENDPOINT: ${{ secrets.TELEMETRY_ENDPOINT }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_COLLECTOR_ENDPOINT }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-json-report pytest-cov

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          START_TIME=$(date +%s%3N)

          pytest --json-report --json-report-file=report.json \
                 --cov=src --cov-report=json:coverage.json \
                 -v || TEST_EXIT_CODE=$?

          END_TIME=$(date +%s%3N)
          echo "duration_ms=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"
          echo "exit_code=${TEST_EXIT_CODE:-0}" >> "$GITHUB_OUTPUT"

          exit ${TEST_EXIT_CODE:-0}

      - name: Send telemetry to dashboard
        if: always()
        env:
          CI_AGENT_ID: github-${{ runner.os }}-py${{ matrix.python-version }}
          CI_BUILD_ID: ${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}-py${{ matrix.python-version }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          python - <<'EOF'
          import json, os, sys
          sys.path.insert(0, '.')
          from ci_telemetry_client import TelemetryClient, BuildEvent

          endpoint = os.environ.get('TELEMETRY_ENDPOINT', '').strip()
          if not endpoint:
              print('TELEMETRY_ENDPOINT secret not set — skipping telemetry.')
              sys.exit(0)

          try:
              with open('report.json') as f:
                  report = json.load(f)
              summary = report.get('summary', {})
              failed = summary.get('failed', 0) + summary.get('error', 0)
              passed = summary.get('passed', 0)
              duration_ms = int(report.get('duration', 0) * 1000)
              status = 'PASS' if failed == 0 else 'FAIL'
          except Exception as e:
              print(f'Could not read report.json: {e}', file=sys.stderr)
              status = 'FAIL'
              duration_ms = 0
              passed = failed = 0

          event = BuildEvent(
              agent_id=os.environ['CI_AGENT_ID'],
              build_id=os.environ['CI_BUILD_ID'],
              status=status,
              duration_ms=duration_ms,
              metadata={
                  'passed': passed,
                  'failed': failed,
                  'python_version': os.environ.get('PYTHON_VERSION'),
                  'branch': os.environ.get('GIT_BRANCH'),
                  'commit': os.environ.get('GIT_COMMIT', '')[:8],
              }
          )

          success = TelemetryClient(endpoint).send_event(event)
          print(f"Telemetry {'sent' if success else 'FAILED'}: {status} in {duration_ms}ms "
                f"(passed={passed}, failed={failed})")
          sys.exit(0 if success else 1)
          EOF

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: |
            report.json
            coverage.json

  flakiness-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run flakiness detection
        env:
          TELEMETRY_ENDPOINT: ${{ secrets.TELEMETRY_ENDPOINT }}
          CI_AGENT_ID: github-flakiness-${{ runner.os }}
          CI_BUILD_ID: ${{ github.repository }}-${{ github.run_id }}-flakiness
        run: python ci_telemetry_client.py
